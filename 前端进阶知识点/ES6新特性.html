<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES6+ 特性 · 代码与效果</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✨ ES6+ 新特性</h1>
        <p>let/const、箭头函数、解构、模板字符串等</p>
    </div>

    <section class="section">
        <h2 class="section-title">🔹 let / const</h2>
        <div class="card-grid">
            <div class="card">
                <div class="card-header"><code>块级作用域</code></div>
                <div class="card-code">let x = 1; if(true) { let x = 2; } // 外部x仍为1</div>
                <div class="card-effect">
                    <script>
                        let x = 1;
                        if(true) { let x = 2; }
                        document.write('<p>外部x = ' + x + '</p>');
                    </script>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <h2 class="section-title">➡️ 箭头函数</h2>
        <div class="card-grid">
            <div class="card">
                <div class="card-header"><code>简洁写法</code></div>
                <div class="card-code">const add = (a,b) => a + b;</div>
                <div class="card-effect">
                    <script>
                        const add = (a,b) => a + b;
                        document.write('<p>add(3,7) = ' + add(3,7) + '</p>');
                    </script>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <h2 class="section-title">📦 解构赋值</h2>
        <div class="card-grid">
            <div class="card">
                <div class="card-header"><code>数组解构</code></div>
                <div class="card-code">const [a, b] = [1, 2];</div>
                <div class="card-effect">
                    <script>
                        const [a, b] = [1, 2];
                        document.write('<p>a=' + a + ', b=' + b + '</p>');
                    </script>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><code>对象解构</code></div>
                <div class="card-code">const {name, age} = person;</div>
                <div class="card-effect">
                    <script>
                        const person = {name: '张三', age: 25};
                        const {name, age} = person;
                        document.write('<p>name=' + name + ', age=' + age + '</p>');
                    </script>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <h2 class="section-title">📝 模板字符串</h2>
        <div class="card-grid">
            <div class="card">
                <div class="card-header"><code>反引号</code></div>
                <div class="card-code">`Hello, ${name}!`</div>
                <div class="card-effect">
                    <script>
                        const userName = '李四';
                        document.write(`<p>${userName}，你好！</p>`);
                    </script>
                </div>
            </div>
        </div>
    </section>

    <footer>
        ⚡ ES6+ 让代码更简洁、更强大。
    </footer>
</div>
</body>
</html>
